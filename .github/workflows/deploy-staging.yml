name: Deploy to Staging

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  deploy-contracts:
    runs-on: ubuntu-latest
    outputs:
      contract_id: ${{ steps.deploy_crowdfund.outputs.contract_id }}
      registry_id: ${{ steps.deploy_registry.outputs.registry_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + WASM target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build and optimize WASM
        run: |
          cargo build --release --target wasm32-unknown-unknown --manifest-path contracts/crowdfund/Cargo.toml
          cargo build --release --target wasm32-unknown-unknown --manifest-path contracts/registry/Cargo.toml

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli --features opt

      - name: Configure Stellar testnet identity
        env:
          TESTNET_SECRET_KEY: ${{ secrets.TESTNET_SECRET_KEY }}
        run: |
          stellar keys add deployer --secret-key "$TESTNET_SECRET_KEY"
          stellar network add testnet \
            --rpc-url https://soroban-testnet.stellar.org \
            --network-passphrase "Test SDF Network ; September 2015"

      - name: Deploy registry contract
        id: deploy_registry
        run: |
          REGISTRY_ID=$(stellar contract deploy \
            --wasm target/wasm32-unknown-unknown/release/registry.wasm \
            --network testnet \
            --source deployer)
          echo "registry_id=$REGISTRY_ID" >> "$GITHUB_OUTPUT"

      - name: Deploy crowdfund contract
        id: deploy_crowdfund
        run: |
          CONTRACT_ID=$(stellar contract deploy \
            --wasm target/wasm32-unknown-unknown/release/crowdfund.wasm \
            --network testnet \
            --source deployer)
          echo "contract_id=$CONTRACT_ID" >> "$GITHUB_OUTPUT"

      - name: Initialize contract
        env:
          CONTRACT_ID: ${{ steps.deploy_crowdfund.outputs.contract_id }}
        run: |
          DEADLINE=$(date -d "+30 days" +%s)
          stellar contract invoke \
            --id "$CONTRACT_ID" \
            --network testnet \
            --source deployer \
            -- initialize \
            --creator "$(stellar keys address deployer)" \
            --token CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC \
            --goal 1000000000 \
            --deadline "$DEADLINE" \
            --min_contribution 1000000 \
            --title "Staging Campaign" \
            --description "Staging environment deployment" \
            --social_links "null" \
            --platform_config null

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-contracts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: apps/interface/package-lock.json

      - name: Install dependencies
        working-directory: apps/interface
        run: npm ci

      - name: Build frontend
        working-directory: apps/interface
        env:
          NEXT_PUBLIC_CROWDFUND_CONTRACT_ID: ${{ needs.deploy-contracts.outputs.contract_id }}
          NEXT_PUBLIC_REGISTRY_CONTRACT_ID: ${{ needs.deploy-contracts.outputs.registry_id }}
          NEXT_PUBLIC_SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
          NEXT_PUBLIC_NETWORK_PASSPHRASE: Test SDF Network ; September 2015
          NEXT_PUBLIC_HORIZON_URL: https://horizon-testnet.stellar.org
        run: npm run build

      - name: Write deployment summary
        env:
          CONTRACT_ID: ${{ needs.deploy-contracts.outputs.contract_id }}
          REGISTRY_ID: ${{ needs.deploy-contracts.outputs.registry_id }}
        run: |
          {
            echo "## 🚀 Staging Deployment"
            echo ""
            echo "### Contract Addresses"
            echo "| Component | Address |"
            echo "|---|---|"
            echo "| Crowdfund Contract | \`$CONTRACT_ID\` |"
            echo "| Registry Contract | \`$REGISTRY_ID\` |"
            echo ""
            echo "### Environment"
            echo "- Network: Stellar Testnet"
            echo "- RPC: https://soroban-testnet.stellar.org"
            echo "- Horizon: https://horizon-testnet.stellar.org"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          CONTRACT_ID: ${{ needs.deploy-contracts.outputs.contract_id }}
          REGISTRY_ID: ${{ needs.deploy-contracts.outputs.registry_id }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🚀 Staging Deployment Complete
            
            ### Contract Addresses
            - **Crowdfund Contract**: \`${process.env.CONTRACT_ID}\`
            - **Registry Contract**: \`${process.env.REGISTRY_ID}\`
            
            ### Test Environment
            - Network: Stellar Testnet
            - RPC: https://soroban-testnet.stellar.org
            - Horizon: https://horizon-testnet.stellar.org
            
            ### Testing Instructions
            1. Configure your Freighter wallet to use Testnet
            2. Update your local \`.env.local\` with the contract IDs above
            3. Run \`npm run dev\` in \`apps/interface\`
            4. Test the deployed contracts on testnet`
            })
