name: Security Audit

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday

jobs:
  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        run: |
          cargo audit --json > audit-report.json || true
          cargo audit

      - name: Generate audit report
        run: |
          {
            echo "## 🔒 Security Audit Report"
            echo ""
            if [ -f audit-report.json ]; then
              vulnerabilities=$(jq '.vulnerabilities.count' audit-report.json 2>/dev/null || echo "0")
              warnings=$(jq '.warnings | length' audit-report.json 2>/dev/null || echo "0")
              echo "- **Vulnerabilities Found**: $vulnerabilities"
              echo "- **Warnings**: $warnings"
              echo ""
              if [ "$vulnerabilities" != "0" ]; then
                echo "### Critical Issues"
                jq -r '.vulnerabilities.list[] | "- **\(.advisory.id)**: \(.advisory.title) (Severity: \(.advisory.severity))"' audit-report.json 2>/dev/null || echo "Unable to parse vulnerabilities"
              fi
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check for critical vulnerabilities
        run: |
          if [ -f audit-report.json ]; then
            critical=$(jq '[.vulnerabilities.list[] | select(.advisory.severity == "critical")] | length' audit-report.json 2>/dev/null || echo "0")
            if [ "$critical" != "0" ]; then
              echo "❌ Found $critical critical vulnerabilities!"
              exit 1
            fi
          fi

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cargo-audit-report
          path: audit-report.json

  cargo-geiger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-geiger
        run: cargo install cargo-geiger

      - name: Run cargo-geiger
        run: |
          cargo geiger --output-format json > geiger-report.json || true
          cargo geiger

      - name: Generate unsafe code report
        run: |
          {
            echo "## ☢️ Unsafe Code Analysis"
            echo ""
            if [ -f geiger-report.json ]; then
              echo "### Summary"
              echo ""
              echo "Analysis of unsafe code usage in dependencies and contracts."
              echo ""
              echo "See full report in artifacts."
            else
              echo "No geiger data available"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload geiger report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cargo-geiger-report
          path: geiger-report.json

  custom-security-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for common security issues
        run: |
          {
            echo "## 🛡️ Custom Security Checks"
            echo ""
            echo "### Checks Performed"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          FAILED=0

          # Check for unwrap() usage
          echo "#### Checking for unsafe unwrap() calls..."
          if grep -r "\.unwrap()" contracts/ --include="*.rs" | grep -v "test" | grep -v "//"; then
            echo "⚠️ Found unwrap() calls - consider using proper error handling" >> "$GITHUB_STEP_SUMMARY"
            FAILED=1
          else
            echo "✅ No unsafe unwrap() calls found" >> "$GITHUB_STEP_SUMMARY"
          fi

          # Check for panic! usage
          echo "#### Checking for panic! macros..."
          if grep -r "panic!" contracts/ --include="*.rs" | grep -v "test" | grep -v "//"; then
            echo "⚠️ Found panic! macros - consider using Result types" >> "$GITHUB_STEP_SUMMARY"
            FAILED=1
          else
            echo "✅ No panic! macros found" >> "$GITHUB_STEP_SUMMARY"
          fi

          # Check for TODO/FIXME in contracts
          echo "#### Checking for TODO/FIXME comments..."
          if grep -r "TODO\|FIXME" contracts/ --include="*.rs" | grep -v "test"; then
            echo "⚠️ Found TODO/FIXME comments in production code" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "✅ No TODO/FIXME comments in production code" >> "$GITHUB_STEP_SUMMARY"
          fi

          # Check for hardcoded addresses
          echo "#### Checking for hardcoded addresses..."
          if grep -rE "G[A-Z0-9]{55}" contracts/ --include="*.rs" | grep -v "test" | grep -v "//"; then
            echo "⚠️ Found potential hardcoded Stellar addresses" >> "$GITHUB_STEP_SUMMARY"
            FAILED=1
          else
            echo "✅ No hardcoded addresses found" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "⚠️ Some security checks failed - review warnings above"
            exit 1
          fi

  clippy-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Run Clippy with security lints
        run: |
          cargo clippy --all-targets --all-features -- \
            -W clippy::unwrap_used \
            -W clippy::expect_used \
            -W clippy::panic \
            -W clippy::integer_arithmetic \
            -W clippy::indexing_slicing \
            -D warnings

  summary:
    runs-on: ubuntu-latest
    needs: [cargo-audit, cargo-geiger, custom-security-checks, clippy-security]
    if: always()
    steps:
      - name: Generate final summary
        run: |
          {
            echo "## 📋 Security Audit Summary"
            echo ""
            echo "All security checks completed. Review individual job outputs for details."
            echo ""
            echo "### Jobs Status"
            echo "- cargo-audit: ${{ needs.cargo-audit.result }}"
            echo "- cargo-geiger: ${{ needs.cargo-geiger.result }}"
            echo "- custom-security-checks: ${{ needs.custom-security-checks.result }}"
            echo "- clippy-security: ${{ needs.clippy-security.result }}"
          } >> "$GITHUB_STEP_SUMMARY"
